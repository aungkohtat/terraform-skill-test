name: "Terraform S3 Module CI"

on:
  push:
    branches: [main]
    paths:
      - "modules/s3/**"
  pull_request:
    branches: [main]
    paths:
      - "modules/s3/**"

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.14.3"
  MODULE_DIR: "modules/s3"

jobs:
  # -----------------------------------------------
  # Stage 1: Static analysis (free, fast)
  # -----------------------------------------------
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.MODULE_DIR }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ env.MODULE_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.MODULE_DIR }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint Init
        run: tflint --init
        working-directory: ${{ env.MODULE_DIR }}

      - name: TFLint Run
        run: tflint --recursive
        working-directory: ${{ env.MODULE_DIR }}

  # -----------------------------------------------
  # Stage 2: Security scanning (free)
  # -----------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ${{ env.MODULE_DIR }}
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.MODULE_DIR }}
          framework: terraform
          quiet: true
          compact: true

  # -----------------------------------------------
  # Stage 3: Unit tests with mocks (free)
  # -----------------------------------------------
  unit-test:
    name: Unit Tests (Mocked)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ env.MODULE_DIR }}

      - name: Run Unit Tests
        run: terraform test -filter=tests/unit.tftest.hcl -verbose
        working-directory: ${{ env.MODULE_DIR }}

  # -----------------------------------------------
  # Stage 4: Integration tests (costs money, main only)
  # -----------------------------------------------
  integration-test:
    name: Integration Tests (Real AWS)
    needs: unit-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TEST_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ env.MODULE_DIR }}

      - name: Run Integration Tests
        run: terraform test -filter=tests/integration.tftest.hcl -verbose
        working-directory: ${{ env.MODULE_DIR }}

  # -----------------------------------------------
  # Stage 5: Cost estimation (PRs only)
  # -----------------------------------------------
  cost-estimate:
    name: Cost Estimation
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - name: Generate Infracost diff
        run: |
          infracost breakdown --path=${{ env.MODULE_DIR }}/examples/complete \
            --format=json \
            --out-file=/tmp/infracost-base.json
        working-directory: base

      - name: Generate Infracost diff (current)
        run: |
          infracost breakdown --path=${{ env.MODULE_DIR }}/examples/complete \
            --format=json \
            --out-file=/tmp/infracost-current.json

      - name: Generate Infracost diff report
        run: |
          infracost diff \
            --path=${{ env.MODULE_DIR }}/examples/complete \
            --compare-to=/tmp/infracost-base.json \
            --format=json \
            --out-file=/tmp/infracost-diff.json

      - name: Post Cost Comment on PR
        uses: infracost/actions/comment@v1
        with:
          path: /tmp/infracost-diff.json
          behavior: update
